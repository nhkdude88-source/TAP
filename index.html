<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Te Ara Pōwhiri Pocket Guide</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .accordion-content { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-amber-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // SVG Icons for the UI
        const Icons = {
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Heart: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 0C1.46 6.7 1.33 10.28 4 13l8 8 8-8c2.67-2.72 2.54-6.3.42-8.42z"></path></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
            Brain: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"></path><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"></path></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
            Quote: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"></path></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            Hand: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>
        };

        // 8 Phases of Te Ara Pōwhiri
        const phaseData = [
            {
                id: 1,
                name: "WAEREA",
                subtitle: "The Clearing",
                pou: "Pou Tuarongo",
                brainRegion: "Brainstem / Self Regulation",
                hp: "Te Waharoa",
                imageUrl: "https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=600&auto=format&fit=crop", 
                color: "bg-red-900",
                lightColor: "bg-red-50",
                textColor: "text-red-900",
                borderColor: "border-red-200",
                icon: "Shield",
                indicators: "Practitioner preparing to enter the space. Receiving the referral. Internal check required before engagement.",
                action: "Clear your own stress response before engaging. Slow your breathing, soften your tone, anchor your posture. A dysregulated adult cannot welcome a warrior.",
                script: "Before engaging, I must clear my own static and ground myself in He Urungā Tū. A dysregulated adult cannot co-regulate a dysregulated child."
            },
            {
                id: 2,
                name: "WERO",
                subtitle: "The Challenge",
                pou: "Pou Tuarongo",
                brainRegion: "Brainstem / Safety Check",
                hp: "Whakawhanaungatanga",
                imageUrl: null, 
                color: "bg-red-800",
                lightColor: "bg-red-50",
                textColor: "text-red-800",
                borderColor: "border-red-200",
                icon: "Shield",
                indicators: "Yelling, posturing, running, refusing. Threat appraisal and survival response. Nervous system is in fight/flight.",
                action: "Read behaviour as a safety check, not disrespect. Do not escalate or argue. Reduce volume, reduce demands, increase predictability. Wait for the challenge to settle.",
                script: "His Survival Brain (Pou Tuarongo) is activated. This is a safety check (Wero), not defiance. Lower demands and hold the space safely."
            },
            {
                id: 3,
                name: "KARANGA",
                subtitle: "The Call",
                pou: "Pou Tokomanawa",
                brainRegion: "Limbic / Relational Connection",
                hp: "Kohikohi",
                imageUrl: "https://images.unsplash.com/photo-1518182170546-076616fdcd80?q=80&w=600&auto=format&fit=crop", 
                color: "bg-emerald-900",
                lightColor: "bg-emerald-50",
                textColor: "text-emerald-900",
                borderColor: "border-emerald-200",
                icon: "Heart",
                indicators: "Pausing, checking for safety, assessing friend or foe. Looking for belonging and emotional safety.",
                action: "Use voice, warmth, and rhythm to signal safety. Connect to the person (whakapapa, mana, identity), not the problem. 'I see you. I’m with you.'",
                script: "His Emotional Brain is scanning for threats. He needs a Karanga. Soften your tone, use his name, and acknowledge him before talking about schoolwork."
            },
            {
                id: 4,
                name: "WHAIKŌRERO",
                subtitle: "The Speech",
                pou: "Pou Tokomanawa",
                brainRegion: "Limbic / Sense-Making",
                hp: "Āta Whakaaro",
                imageUrl: null, 
                color: "bg-emerald-800",
                lightColor: "bg-emerald-50",
                textColor: "text-emerald-800",
                borderColor: "border-emerald-200",
                icon: "Heart",
                indicators: "Gathering narratives, exchanging truths, analyzing patterns of behaviour across the ecosystem.",
                action: "Speak the truth with mana. Reframe the narrative from deficit to clinical understanding. Validate experiences while advocating for the mokopuna's emotional safety.",
                script: "The data shows us his nervous system drops into a survival response when culturally unsafe. We need to heal the environment, not fix the child."
            },
            {
                id: 5,
                name: "WAIATA",
                subtitle: "The Song",
                pou: "Pou Tāhū",
                brainRegion: "Diencephalon / Rhythm & State Regulation",
                hp: "Tātai",
                imageUrl: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=600&auto=format&fit=crop", 
                color: "bg-blue-900",
                lightColor: "bg-blue-50",
                textColor: "text-blue-900",
                borderColor: "border-blue-200",
                icon: "Activity",
                indicators: "Arousal settling through predictability and low cognitive load. Looking for a pattern to latch onto.",
                action: "Engage in simple, repetitive rhythm (waiata, humming, walking side-by-side). Keep tempo steady and familiar. Rhythm communicates 'safe' faster than words.",
                script: "A plan cannot be dictated; it must be a shared rhythm. We need to design interventions that rely on predictability to soothe the Movement Brain."
            },
            {
                id: 6,
                name: "KOHA",
                subtitle: "The Gift",
                pou: "Pou Tāhū",
                brainRegion: "Diencephalon / Reciprocity & Agency",
                hp: "Whakamahi",
                imageUrl: null, 
                color: "bg-blue-800",
                lightColor: "bg-blue-50",
                textColor: "text-blue-800",
                borderColor: "border-blue-200",
                icon: "Activity",
                indicators: "Ready for exchange. Choice returns control and reduces threat. Willing to cooperate if given agency.",
                action: "Offer a mana-enhancing way forward (water, break, a choice of task order). This signals the shift from conflict to exchange. Agency opens the pathway toward problem-solving.",
                script: "Offer a way forward with dignity. This reciprocal exchange (Koha) regulates the nervous system and shifts us from conflict to collaboration."
            },
            {
                id: 7,
                name: "HONGI",
                subtitle: "The Shared Breath",
                pou: "Pou Kaiāwhā",
                brainRegion: "Cortex & Limbic / Co-Regulation",
                hp: "Whai Whakaaro",
                imageUrl: "https://images.unsplash.com/photo-1533107862482-0e6974b06ec4?q=80&w=600&auto=format&fit=crop", 
                color: "bg-amber-700",
                lightColor: "bg-amber-50",
                textColor: "text-amber-800",
                borderColor: "border-amber-200",
                icon: "Brain",
                indicators: "Relational settling and nervous system synchrony. Shoulders drop, relaxed posture. The 'tapu' begins to lift.",
                action: "Use safe proximity (non-threatening posture, soft eye gaze). Allow silence and shared breathing to do the work. (In kura, hongi may be enacted as shared hā rather than physical contact).",
                script: "The environment is becoming Noa. By standing side-by-side and sharing the heavy lifting, we lift the tapu of the crisis."
            },
            {
                id: 8,
                name: "HĀKARI",
                subtitle: "The Feast",
                pou: "Pou Kaiāwhā",
                brainRegion: "Cerebral Cortex / Learning & Executive Function",
                hp: "Mana Motuhake",
                imageUrl: null, 
                color: "bg-amber-600",
                lightColor: "bg-amber-50",
                textColor: "text-amber-800",
                borderColor: "border-amber-200",
                icon: "Brain",
                indicators: "Cognitive access restored: planning, reflection, learning. Making eye contact, ready to engage intellectually.",
                action: "The Cognitive Feast: Only once the student is settled and Noa do we introduce reflection, reasoning, teaching, repair conversations, or academic tasks.",
                script: "The environment is Noa (Safe). His Thinking Brain (Pou Kaiāwhā) is online. Now we can do the cognitive work, reflect on the behaviour, and engage in learning."
            }
        ];

        function App() {
            const [expandedId, setExpandedId] = useState(null);

            const toggleExpand = (id) => {
                setExpandedId(expandedId === id ? null : id);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-100 sm:shadow-2xl sm:my-8 sm:rounded-3xl flex flex-col relative overflow-hidden">
                    
                    {/* Header */}
                    <header className="bg-slate-900 text-white px-6 pt-10 pb-8 shadow-md z-10 rounded-b-3xl shrink-0">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight mb-1">Te Ara Pōwhiri</h1>
                                <h2 className="text-xs text-slate-400 font-bold tracking-widest uppercase">Pouwhirinaki Field Guide</h2>
                            </div>
                        </div>
                        <p className="mt-4 text-sm text-slate-300 leading-relaxed font-medium">
                            Select the Pōwhiri phase you are currently observing to align your clinical response, He Pikorua action, and Kaiako script.
                        </p>
                    </header>

                    {/* Accordion List */}
                    <main className="flex-1 px-4 -mt-4 pt-8 pb-10 z-0 overflow-y-auto no-scrollbar">
                        <div className="space-y-3">
                            {phaseData.map((phase) => {
                                const isExpanded = expandedId === phase.id;
                                const IconComponent = Icons[phase.icon];
                                const ChevronDown = Icons.ChevronDown;
                                const ChevronUp = Icons.ChevronUp;
                                const Eye = Icons.Eye;
                                const Hand = Icons.Hand;
                                const Quote = Icons.Quote;

                                return (
                                    <div key={phase.id} className={`bg-white rounded-2xl shadow-sm border overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'ring-2 ring-slate-400 shadow-md' : 'border-gray-200'}`}>
                                        
                                        {/* Accordion Header */}
                                        <button
                                            onClick={() => toggleExpand(phase.id)}
                                            className={`w-full flex items-center justify-between p-4 text-left transition-colors duration-200 ${isExpanded ? phase.color : 'bg-white hover:bg-gray-50'}`}
                                        >
                                            <div className="flex items-center space-x-4">
                                                <div className={`p-2 rounded-xl flex items-center justify-center w-10 h-10 ${isExpanded ? 'bg-white/20 text-white' : phase.textColor + ' bg-gray-100'}`}>
                                                    <span className="font-black text-sm mr-1">{phase.id}.</span> 
                                                </div>
                                                <div>
                                                    <h3 className={`font-bold text-lg leading-tight tracking-wide ${isExpanded ? 'text-white' : 'text-slate-900'}`}>
                                                        {phase.name}
                                                    </h3>
                                                    <p className={`text-xs font-semibold mt-0.5 uppercase tracking-wider ${isExpanded ? 'text-white/80' : 'text-slate-500'}`}>
                                                        {phase.subtitle}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="shrink-0 ml-2">
                                                {isExpanded ? <ChevronUp className="text-white" /> : <ChevronDown className="text-slate-400" />}
                                            </div>
                                        </button>

                                        {/* Accordion Body */}
                                        <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isExpanded ? 'max-h-[1200px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                            <div className="p-5 space-y-6 bg-white">
                                                
                                                {/* Badge Alignment Matrix */}
                                                <div className="flex flex-wrap gap-2">
                                                    <span className={`px-2.5 py-1 text-[10px] font-extrabold uppercase rounded-full border ${phase.textColor} ${phase.borderColor} ${phase.lightColor}`}>
                                                        He Pikorua: {phase.hp}
                                                    </span>
                                                    <span className={`px-2.5 py-1 text-[10px] font-extrabold uppercase rounded-full border ${phase.textColor} ${phase.borderColor} ${phase.lightColor}`}>
                                                        {phase.pou}
                                                    </span>
                                                    <span className={`px-2.5 py-1 text-[10px] font-extrabold uppercase rounded-full border text-slate-600 border-slate-200 bg-slate-50 flex items-center`}>
                                                        <IconComponent /> <span className="ml-1.5">{phase.brainRegion}</span>
                                                    </span>
                                                </div>

                                                {/* IMAGE SECTION (Only shows if URL exists) */}
                                                {phase.imageUrl && (
                                                    <div className="w-full h-28 overflow-hidden rounded-xl border-2 shadow-sm" style={{ borderColor: '#' + (phase.color.includes('red') ? '991b1b' : phase.color.includes('emerald') ? '065f46' : phase.color.includes('blue') ? '1e40af' : 'b45309') }}>
                                                        <img src={phase.imageUrl} alt={phase.name} className="w-full h-full object-cover" />
                                                    </div>
                                                )}

                                                {/* Indicators */}
                                                <div>
                                                    <div className="flex items-center space-x-2 mb-2">
                                                        <Eye />
                                                        <h4 className="font-bold text-slate-800 text-sm uppercase tracking-wide">What You See</h4>
                                                    </div>
                                                    <p className="text-sm text-slate-600 leading-relaxed pl-6 border-l-2 border-slate-200">
                                                        {phase.indicators}
                                                    </p>
                                                </div>

                                                {/* Action */}
                                                <div>
                                                    <div className="flex items-center space-x-2 mb-2">
                                                        <Hand />
                                                        <h4 className="font-bold text-slate-800 text-sm uppercase tracking-wide">Your RTLB Action</h4>
                                                    </div>
                                                    <p className="text-sm text-slate-600 leading-relaxed pl-6 border-l-2 border-slate-200">
                                                        {phase.action}
                                                    </p>
                                                </div>

                                                {/* Script */}
                                                <div className={`mt-2 p-4 rounded-xl border-l-4 shadow-sm bg-white border ${phase.borderColor}`} style={{ borderLeftColor: '#' + (phase.color.includes('red') ? '991b1b' : phase.color.includes('emerald') ? '065f46' : phase.color.includes('blue') ? '1e40af' : 'b45309') }}>
                                                    <div className="flex items-center space-x-2 mb-2">
                                                        <Quote />
                                                        <h4 className={`font-bold text-sm uppercase tracking-wide ${phase.textColor}`}>Kaiako Coaching Script</h4>
                                                    </div>
                                                    <p className="text-sm text-slate-800 italic font-medium leading-relaxed">
                                                        "{phase.script}"
                                                    </p>
                                                </div>

                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                    
                    {/* Footer */}
                    <footer className="py-5 text-center text-xs text-slate-400 bg-slate-100 shrink-0">
                        <p>Developed for Cluster 21 Pouwhirinaki.</p>
                        <p className="mt-1 font-medium">Daelan Karangaroa PhD Research © 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
